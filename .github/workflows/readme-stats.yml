name: Update GitHub Readme Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
  push:
    branches: ["main"]
    paths:
      - README.md
      - .github/workflows/readme-stats.yml

permissions:
  contents: write

concurrency:
  group: github-readme-stats
  cancel-in-progress: true

jobs:
  cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=khoazandev&custom_title=Khoa%27s%20GitHub%20Stats&show_icons=true&theme=transparent&hide_border=true&hide_rank=true&include_all_commits=true&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=khoazandev&layout=compact&langs_count=6&theme=transparent&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update GitHub Readme Stats cards" || exit 0
          git push
